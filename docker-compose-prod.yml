services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fintech-db
    environment:
      POSTGRES_DB: ${DB_NAME:-fintech_db}
      POSTGRES_USER: ${DB_USER:-fintech_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fintech_pass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fintech_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend - API Node.js
  backend:
    image: nathyguaillas/fintech-backend:v1
    container_name: fintech-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fintech_db}
      DB_USER: ${DB_USER:-fintech_user}
      DB_PASSWORD: ${DB_PASSWORD:-fintech_pass123}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fintech-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - React con Nginx
  frontend:
    image: nathyguaillas/fintech-frontend:v1
    container_name: fintech-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fintech-network
    restart: unless-stopped

networks:
  fintech-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
